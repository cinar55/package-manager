<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoftHub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e2e0d8;
    --border2: #c8c6be;
    --text: #1c1c1a;
    --text2: #6b6964;
    --text3: #9b9890;
    --accent: #1a6bbf;
    --accent-hover: #155899;
    --row-hover: #f2f1ed;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181816;
      --surface: #222220;
      --border: #2e2e2b;
      --border2: #3e3e3b;
      --text: #e8e6df;
      --text2: #9b9890;
      --text3: #5f5e5a;
      --accent: #4a9ede;
      --accent-hover: #6ab4f0;
      --row-hover: #2a2a27;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  #logo {
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }

  #search-wrap {
    flex: 1;
    max-width: 400px;
    position: relative;
  }

  #search {
    width: 100%;
    height: 34px;
    padding: 0 12px 0 34px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }

  #search-ico {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 13px;
    pointer-events: none;
  }

  #pkg-count {
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
    margin-left: auto;
  }

  #main { max-width: 780px; margin: 24px auto; padding: 0 16px; }

  #list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: background 0.1s;
  }
  .row:last-of-type { border-bottom: none; }
  .row:hover { background: var(--row-hover); }

  .row-icon {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg);
  }
  .row-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 4px;
  }

  .row-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row-dl {
    flex-shrink: 0;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 500;
    color: #fff;
    background: var(--accent);
    border-radius: 5px;
    text-decoration: none;
    transition: background 0.15s;
    pointer-events: none;
  }
  .row:hover .row-dl { background: var(--accent-hover); }

  .skel {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .skel:last-child { border-bottom: none; }
  .skel-icon { width: 30px; height: 30px; border-radius: 6px; background: var(--border); flex-shrink: 0; animation: pulse 1.4s infinite; }
  .skel-name { height: 13px; border-radius: 4px; background: var(--border); flex: 1; max-width: 200px; animation: pulse 1.4s infinite; }
  .skel-btn  { width: 70px; height: 26px; border-radius: 5px; background: var(--border); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:.45} 50%{opacity:.9} }

  #empty {
    padding: 40px;
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    display: none;
  }

  #error-box {
    padding: 12px 16px;
    margin-bottom: 16px;
    border-radius: 8px;
    font-size: 13px;
    background: #fff0f0;
    color: #a32d2d;
    border: 1px solid #f0b0b0;
    display: none;
  }
  @media (prefers-color-scheme: dark) {
    #error-box { background: #2a1010; color: #f09595; border-color: #5a2020; }
  }
</style>
</head>
<body>

<div id="header">
  <div id="logo">⚡ SoftHub</div>
  <div id="search-wrap">
    <span id="search-ico">🔍</span>
    <input id="search" type="text" placeholder="Search software..." oninput="filter()">
  </div>
  <span id="pkg-count">Loading…</span>
</div>

<div id="main">
  <div id="error-box"></div>
  <div id="list">
    <div id="skels">
      <div class="skel"><div class="skel-icon"></div><div class="skel-name"></div><div class="skel-btn"></div></div>
      <div class="skel"><div class="skel-icon"></div><div class="skel-name"></div><div class="skel-btn"></div></div>
      <div class="skel"><div class="skel-icon"></div><div class="skel-name"></div><div class="skel-btn"></div></div>
      <div class="skel"><div class="skel-icon"></div><div class="skel-name"></div><div class="skel-btn"></div></div>
      <div class="skel"><div class="skel-icon"></div><div class="skel-name"></div><div class="skel-btn"></div></div>
      <div class="skel"><div class="skel-icon"></div><div class="skel-name"></div><div class="skel-btn"></div></div>
    </div>
    <div id="empty">No results found.</div>
  </div>
</div>

<script>
const REPO   = 'cinar55/package-manager';
const BRANCH = 'main';
const RAW    = 'https://raw.githubusercontent.com/' + REPO + '/' + BRANCH + '/';
const API    = 'https://api.github.com/repos/' + REPO + '/contents?ref=' + BRANCH;

let apps = [];

function parseYaml(txt) {
  const o = {};
  for (const line of txt.split('\n')) {
    const m = line.match(/^([^:#\n]+?)\s*:\s*(.*)/);
    if (m) {
      const key = m[1].trim().toUpperCase();
      const val = m[2].trim().replace(/^['"]|['"]$/g, '');
      o[key] = val;
    }
  }
  return o;
}

function isUrl(s) { return typeof s === 'string' && /^https?:\/\//.test(s); }

function makeRow(app) {
  const link = app.LINK || app['LİNK'] || '';
  const name = app.AD || app['AD'] || 'Unknown';
  const icon = app.ICON || app['İCON'] || app['ICON'] || '';

  const iconHtml = isUrl(icon)
    ? `<img src="${icon}" alt="" onerror="this.parentElement.textContent='📦'">`
    : (icon || '📦');

  const row = document.createElement('a');
  row.className = 'row';
  row.dataset.name = name.toLowerCase();

  if (link) {
    row.href = link;
    row.target = '_blank';
    row.rel = 'noopener noreferrer';
  }

  row.innerHTML =
    `<div class="row-icon">${iconHtml}</div>` +
    `<div class="row-name">${name}</div>` +
    (link ? `<span class="row-dl">Download</span>` : '');

  return row;
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  let vis = 0;
  document.querySelectorAll('.row').forEach(r => {
    const show = r.dataset.name.includes(q);
    r.style.display = show ? '' : 'none';
    if (show) vis++;
  });
  document.getElementById('empty').style.display = (vis === 0) ? 'block' : 'none';
  document.getElementById('pkg-count').textContent = vis + ' packages';
}

async function load() {
  let files;
  try {
    const r = await fetch(API);
    if (!r.ok) throw new Error('Status ' + r.status);
    files = await r.json();
  } catch (e) {
    document.getElementById('skels').remove();
    const eb = document.getElementById('error-box');
    eb.textContent = 'Could not reach GitHub: ' + e.message;
    eb.style.display = 'block';
    return;
  }

  const yamls = files.filter(f => f.name.endsWith('.yaml') || f.name.endsWith('.yml'));
  document.getElementById('pkg-count').textContent = yamls.length + ' packages';
  document.getElementById('skels').remove();

  const list  = document.getElementById('list');
  const empty = document.getElementById('empty');

  await Promise.allSettled(yamls.map(async f => {
    try {
      const r = await fetch(RAW + encodeURIComponent(f.name));
      if (!r.ok) return;
      const app = parseYaml(await r.text());
      const name = app.AD || app['AD'];
      if (!name) return;
      apps.push(app);
      list.insertBefore(makeRow(app), empty);
    } catch (_) {}
  }));

  document.getElementById('pkg-count').textContent = apps.length + ' packages';
}

load();
</script>
</body>
</html>
